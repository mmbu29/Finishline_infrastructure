AWSTemplateFormatVersion: "2010-09-09"
Description: "Karpenter Infrastructure - PascalCase Final Fix"

Parameters:
  ClusterName: { Type: String }
  OIDCProviderArn: { Type: String }
  OIDCSubKey: { Type: String }
  OIDCAudKey: { Type: String }
  OIDCProviderUrl: { Type: String } 

Resources:
  KarpenterControllerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "KarpenterControllerRole-${ClusterName}"
      AssumeRolePolicyDocument: 
        Fn::Sub:
          - |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Principal": { "Federated": "${OIDCArn}" },
                  "Action": "sts:AssumeRoleWithWebIdentity",
                  "Condition": {
                    "StringEquals": {
                      "${SubKey}": "system:serviceaccount:kube-system:karpenter",
                      "${AudKey}": "sts.amazonaws.com"
                    }
                  }
                }
              ]
            }
          - OIDCArn: !Ref OIDCProviderArn
            SubKey: !Ref OIDCSubKey
            AudKey: !Ref OIDCAudKey

      Policies:
        - PolicyName: KarpenterControllerPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "eks:DescribeCluster"
                  - "ec2:*"
                  - "iam:PassRole"
                  - "ssm:GetParameter"
                  - "pricing:GetProducts"
                  - "iam:CreateInstanceProfile"
                  - "iam:GetInstanceProfile"
                  - "iam:DeleteInstanceProfile"
                  - "iam:TagInstanceProfile"
                  - "iam:AddRoleToInstanceProfile"
                  - "iam:RemoveRoleFromInstanceProfile"
                Resource: "*"

  KarpenterNodeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "KarpenterNodeRole-${ClusterName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: "ec2.amazonaws.com" }
            Action: "sts:AssumeRole"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  KarpenterNodeInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "KarpenterNodeInstanceProfile-${ClusterName}"
      Roles: [!Ref KarpenterNodeRole]

Outputs:
  KarpenterControllerRoleArn:
    Value: !GetAtt KarpenterControllerRole.Arn
  KarpenterNodeRoleName:
    Value: !Ref KarpenterNodeRole
  KarpenterNodeInstanceProfileName:
    Value: !Ref KarpenterNodeInstanceProfile