AWSTemplateFormatVersion: "2010-09-09"
Description: IAM Roles for Karpenter v1.x Stable - Finish Line 2026 Project

Parameters:
  ClusterName:
    Type: String
    Default: finishline-dev-eks
  OIDCProviderArn:
    Type: String
    Default: arn:aws:iam::590183777783:oidc-provider/oidc.eks.us-east-1.amazonaws.com/id/9866F594A0402C055D7FF0B73E14F611

Resources:
  KarpenterControllerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ClusterName}-karpenter-controller"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref OIDCProviderArn
            Action: "sts:AssumeRoleWithWebIdentity"
            Condition:
              StringEquals:
                "oidc.eks.us-east-1.amazonaws.com/id/9866F594A0402C055D7FF0B73E14F611:sub": "system:serviceaccount:kube-system:karpenter"
                "oidc.eks.us-east-1.amazonaws.com/id/9866F594A0402C055D7FF0B73E14F611:aud": "sts.amazonaws.com"

  KarpenterControllerPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "${ClusterName}-karpenter-controller-policy"
      Roles:
        - !Ref KarpenterControllerRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          # 1. Scoped permissions for resource management
          - Effect: Allow
            Action:
              - ec2:CreateFleet
              - ec2:CreateLaunchTemplate
              - ec2:CreateTags
              - ec2:RunInstances
              - ec2:TerminateInstances
              - ec2:DeleteLaunchTemplate
              - iam:PassRole
            Resource: "*"
            Condition:
              StringEquals:
                aws:ResourceTag/karpenter.sh/discovery: !Ref ClusterName

          # 2. General discovery permissions (Describe actions are free)
          - Effect: Allow
            Action:
              - ec2:DescribeAvailabilityZones
              - ec2:DescribeImages
              - ec2:DescribeInstances
              - ec2:DescribeInstanceTypeOfferings
              - ec2:DescribeInstanceTypes
              - ec2:DescribeLaunchTemplates
              - ec2:DescribeSecurityGroups
              - ec2:DescribeSubnets
              - eks:DescribeCluster
              - ssm:GetParameter
              - iam:ListInstanceProfiles # Crucial for v1.x initialization
            Resource: "*"

  KarpenterNodeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ClusterName}-karpenter-node-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  KarpenterNodeInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${ClusterName}-karpenter-node-profile"
      Roles:
        - !Ref KarpenterNodeRole

Outputs:
  ControllerRoleArn:
    Description: ARN of the Karpenter controller role
    Value: !GetAtt KarpenterControllerRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ControllerRoleArn"

  NodeInstanceProfile:
    Description: Name of the EC2 instance profile for Karpenter nodes
    Value: !Ref KarpenterNodeInstanceProfile
    Export:
      Name: !Sub "${AWS::StackName}-NodeInstanceProfile"

  NodeRoleName:
    Description: Name of the IAM role for EC2 nodes
    Value: !Ref KarpenterNodeRole
