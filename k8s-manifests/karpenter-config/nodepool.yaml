apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: t3a-bottlerocket-pool
spec:
  template:
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: bottlerocket-t3a
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"] # Removed "spot" to fix the AuthFailure
        - key: node.kubernetes.io/instance-type
          operator: In
          values: ["t3a.medium", "t3a.large"]
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
